name: Build Windows MSI

# Produces a Windows installer (.msi) on every push to main and on manual
# dispatch. Outputs:
#   1. A workflow-run artifact (`jacqline-windows-msi-<sha>`, 14 day
#      retention) — same as before, useful for ad-hoc downloads.
#   2. A rolling GitHub Release tagged `nightly` whose `.msi` + `.sha256`
#      sidecar are overwritten on every successful build. The in-app updater
#      (src-tauri/src/updater.rs) polls this release to offer one-click
#      updates.
#
# Code signing + notarization + a versioned GitHub Release (tag `v*`) land
# in release.yml. For now the MSI is unsigned — Windows SmartScreen will
# warn the user on first run.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Windows MSI
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: build-windows-msi

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Verify bundled ConPTY checksums
        shell: pwsh
        # Fails the build if the committed conpty.dll / OpenConsole.exe
        # have been swapped without updating checksums.txt — protects us
        # from accidentally shipping a tampered or stale ConPTY.
        run: |
          Set-Location src-tauri/binaries/conpty/x64
          $expected = Get-Content checksums.txt
          foreach ($line in $expected) {
            if ($line -match '^([0-9a-f]{64})\s+(.+)$') {
              $hash = $matches[1]
              $name = $matches[2].Trim()
              $actual = (Get-FileHash -Algorithm SHA256 $name).Hash.ToLower()
              if ($actual -ne $hash) {
                throw "Checksum mismatch for $name : expected $hash, got $actual"
              }
              Write-Host "OK $name"
            }
          }

      - name: Tauri build (release + bundle)
        run: bun run tauri build

      - name: Compute SHA256 sidecar
        shell: pwsh
        run: |
          $msi = Get-ChildItem src-tauri/target/release/bundle/msi/*.msi | Select-Object -First 1
          if ($null -eq $msi) { throw "No MSI found under src-tauri/target/release/bundle/msi/" }
          $hash = (Get-FileHash -Algorithm SHA256 $msi.FullName).Hash.ToLower()
          $sidecar = "$($msi.FullName).sha256"
          # `sha256sum`-compatible single-line "<hash>  <filename>"
          Set-Content -Path $sidecar -Value "$hash  $($msi.Name)" -NoNewline
          Write-Host "SHA256 = $hash"
          Write-Host "Sidecar = $sidecar"

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: jacqline-windows-msi-${{ github.sha }}
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.sha256
          retention-days: 14
          if-no-files-found: error

      - name: Publish/refresh nightly GitHub Release
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $msi = Get-ChildItem src-tauri/target/release/bundle/msi/*.msi | Select-Object -First 1
          $sidecar = "$($msi.FullName).sha256"

          $tag = "nightly"
          $shortSha = "${{ github.sha }}".Substring(0, 7)
          $built = (Get-Date -Format "yyyy-MM-dd HH:mm 'UTC'")
          $body = @"
          Rolling nightly build · commit ``$shortSha`` · built $built

          **Unsigned installer.** Windows SmartScreen will warn on first run — click *More info* → *Run anyway*. Code signing lands at the V0.2 release CI.

          - ``jacqline_*.msi`` — Windows installer (x64)
          - ``jacqline_*.msi.sha256`` — SHA-256 sidecar (used by the in-app updater)

          The in-app updater (Settings → System menu → Check for updates) polls this release and offers one-click installs.
          "@

          # The in-app updater compares the release's `target_commitish`
          # (full commit SHA) against the running binary's build SHA. GitHub
          # freezes `published_at` at the release's initial creation and does
          # NOT refresh it on `gh release edit`, so editing the existing
          # release would never advertise a new SHA. Delete + recreate
          # gives us a fresh `target_commitish` every time.
          gh release delete $tag --yes --cleanup-tag 2>$null
          gh release create $tag `
            --title "Jacqline nightly ($shortSha)" `
            --notes "$body" `
            --prerelease `
            --target ${{ github.sha }} `
            "$($msi.FullName)" "$sidecar"
