# CI matrix temporarily reduced to **windows-x64 only** to save GH Actions
# minutes and keep the queue short while we iterate toward V0.1. The other OS
# entries are kept commented below — re-enable them once V0.1 is stable on
# Windows (typically at the Phase 8 release CI). See tasks/lessons.md for
# context.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- Active during pre-V0.1 ---
          - os: windows-latest
            label: windows-x64
            target: x86_64-pc-windows-msvc

          # --- Reactivate when V0.1 is stable on Windows ---
          # - os: macos-latest
          #   label: macos-arm64
          #   target: aarch64-apple-darwin
          # - os: macos-13
          #   label: macos-x64
          #   target: x86_64-apple-darwin
          # - os: ubuntu-latest
          #   label: linux-x64
          #   target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: rustfmt, clippy

      - name: Cache Rust target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: ${{ matrix.label }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            pkg-config \
            build-essential \
            curl \
            wget \
            file

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: TypeScript type-check
        run: bunx tsc --noEmit

      - name: ESLint
        run: bun run lint

      - name: Prettier check
        run: bun run fmt:check

      - name: Rust fmt check
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: Rust clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets --target ${{ matrix.target }} -- -D warnings

      - name: Tauri smoke build (no bundle)
        run: bun run tauri build --no-bundle --target ${{ matrix.target }}
